---
- name: Validate PostgreSQL configuration
  ansible.builtin.assert:
    that:
      - postgresql_password | length >= 16
      - postgresql_allowed_cidrs | length > 0
      - postgresql_allowed_cidrs | select('match', '^[0-9.]+/[0-9]+$') | list | length == postgresql_allowed_cidrs | length
    fail_msg: >-
      PostgreSQL requires a password of at least 16 characters and at least one
      IPv4 CIDR in postgresql_allowed_cidrs.
  no_log: true

- name: Configure PostgreSQL firewall
  ansible.builtin.import_tasks: firewall.yml
  when: postgresql_manage_ufw | bool

- name: Create PostgreSQL data volume
  community.docker.docker_volume:
    name: "{{ postgresql_volume_name }}"
    state: present

- name: Run PostgreSQL container
  community.docker.docker_container:
    name: "{{ postgresql_container_name }}"
    image: "{{ postgresql_image }}"
    state: started
    restart_policy: always
    pull: missing
    network_mode: host
    command: "postgres -p {{ postgresql_port }}"
    volumes:
      - "{{ postgresql_volume_name }}:/var/lib/postgresql/data"
    env:
      POSTGRES_DB: "{{ postgresql_database }}"
      POSTGRES_USER: "{{ postgresql_user }}"
      POSTGRES_PASSWORD: "{{ postgresql_password }}"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -p {{ postgresql_port }} -U {{ postgresql_user }} -d {{ postgresql_database }}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
  no_log: true

- name: Wait for PostgreSQL to accept connections
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ postgresql_port }}"
    delay: 2
    timeout: 60
  when: not ansible_check_mode
