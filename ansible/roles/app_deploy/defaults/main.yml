---
# Docker image and container identity.
app_container_name: project-devops-deploy
app_image_tag: latest
app_image: "{{ app_image_repository }}:{{ app_image_tag }}"

# Published container ports.
app_public_port: "8080"
app_container_management_port: "9090"

# Runtime configuration passed to the Spring Boot application.
app_profile: dev
app_java_opts: "-Xms256m -Xmx512m"

# PostgreSQL connection used by the prod profile.
app_database_host: ""
app_database_port: "5432"
app_database_name: bulletins
app_database_username: bulletins_app
app_database_password: ""
app_database_url: >-
  jdbc:postgresql://{{ app_database_host }}:{{ app_database_port }}/{{ app_database_name }}

# S3-compatible object storage used by the prod profile.
app_s3_bucket: ""
app_s3_region: ""
app_s3_endpoint: ""
app_s3_access_key: ""
app_s3_secret_key: ""
app_s3_cdn_url: ""

# Environment shared by every application profile.
app_common_environment:
  SPRING_PROFILES_ACTIVE: "{{ app_profile }}"
  MANAGEMENT_SERVER_PORT: "{{ app_container_management_port }}"
  JAVA_OPTS: "{{ app_java_opts }}"

# Database and object storage environment is added only where explicitly configured.
app_external_services_environment: {}

# Persistent host paths. Uploaded images are mounted into the path used by LocalImageStorageService.
app_data_dir: /var/lib/project-devops-deploy
app_uploads_dir: "{{ app_data_dir }}/bulletin-images"
app_log_dir: /var/log/project-devops-deploy
app_container_uploads_dir: /tmp/bulletin-images

# Health checks.
app_healthcheck_retries: 30
app_healthcheck_delay: 5
app_healthcheck_path: /
app_healthcheck_status_codes:
  - 200
  - 302
