---
# Docker image and container identity.
app_container_name: project-devops-deploy
app_image_tag: latest
app_image: "{{ app_image_repository }}:{{ app_image_tag }}"

# Published container ports.
app_public_port: "8080"
app_container_management_port: "9090"

# Runtime configuration passed to the Spring Boot application.
app_profile: dev
app_java_opts: "-Xms256m -Xmx512m"

# Persistent host paths. Uploaded images are mounted into the path used by LocalImageStorageService.
app_data_dir: /var/lib/project-devops-deploy
app_uploads_dir: "{{ app_data_dir }}/bulletin-images"
app_log_dir: /var/log/project-devops-deploy
app_container_uploads_dir: /tmp/bulletin-images

# Health checks.
app_healthcheck_retries: 30
app_healthcheck_delay: 5
app_healthcheck_path: /
app_healthcheck_status_codes:
  - 200
  - 302
