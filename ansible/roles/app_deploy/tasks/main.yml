---
- name: Validate Docker image configuration
  ansible.builtin.assert:
    that:
      - app_image_repository is defined
      - app_image_repository | length > 0
    fail_msg: "app_image_repository must identify the Docker image repository."

- name: Validate production database configuration
  ansible.builtin.assert:
    that:
      - app_database_host | length > 0
      - app_database_name | length > 0
      - app_database_username | length > 0
      - app_database_password | length > 0
    fail_msg: "The prod profile requires PostgreSQL connection variables."
  when: app_profile == "prod"
  no_log: true

- name: Validate production object storage configuration
  ansible.builtin.assert:
    that:
      - app_s3_bucket | length > 0
      - app_s3_region | length > 0
      - app_s3_endpoint | length > 0
      - app_s3_access_key | length > 0
      - app_s3_secret_key | length > 0
    fail_msg: "The prod profile requires S3-compatible object storage variables."
  when: app_profile == "prod"
  no_log: true

- name: Deploy application container
  ansible.builtin.import_tasks: deploy_container.yml
