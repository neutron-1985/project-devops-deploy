---
- name: Configure Nginx application proxy
  ansible.builtin.template:
    src: nginx-app.conf.j2
    dest: "{{ app_nginx_conf_path }}"
    owner: root
    group: root
    mode: "0644"

- name: Enable Nginx application proxy
  ansible.builtin.file:
    src: "{{ app_nginx_conf_path }}"
    dest: "{{ app_nginx_enabled_path }}"
    state: link
    force: true

- name: Validate Nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Stop legacy single-container deployment
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: absent
  when: app_container_name != app_target_container_name

- name: Restart Nginx with application proxy
  ansible.builtin.service:
    name: nginx
    state: restarted
    enabled: true

- name: Verify Nginx public listener
  block:
    - name: Wait for Nginx public port after restart
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ app_public_port }}"
        timeout: 30
  rescue:
    - name: Collect Nginx service status
      ansible.builtin.command: systemctl status nginx --no-pager
      register: app_nginx_status_debug
      changed_when: false
      failed_when: false

    - name: Collect listening TCP ports
      ansible.builtin.command: ss -ltnp
      register: app_nginx_ports_debug
      changed_when: false
      failed_when: false

    - name: Collect rendered Nginx site
      ansible.builtin.command: "cat {{ app_nginx_enabled_path }}"
      register: app_nginx_site_debug
      changed_when: false
      failed_when: false

    - name: Collect Nginx compiled configuration
      ansible.builtin.command: nginx -T
      register: app_nginx_config_debug
      changed_when: false
      failed_when: false

    - name: Fail with Nginx diagnostics
      ansible.builtin.fail:
        msg: |
          Nginx did not listen on 127.0.0.1:{{ app_public_port }} after restart.

          systemctl status nginx:
          {{ app_nginx_status_debug.stdout | default('') }}
          {{ app_nginx_status_debug.stderr | default('') }}

          ss -ltnp:
          {{ app_nginx_ports_debug.stdout | default('') }}
          {{ app_nginx_ports_debug.stderr | default('') }}

          {{ app_nginx_enabled_path }}:
          {{ app_nginx_site_debug.stdout | default('') }}
          {{ app_nginx_site_debug.stderr | default('') }}

          nginx -T:
          {{ app_nginx_config_debug.stdout | default('') }}
          {{ app_nginx_config_debug.stderr | default('') }}

- name: Check application through Nginx
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ app_public_port }}{{ app_proxy_healthcheck_path }}"
    method: GET
    status_code: "{{ app_proxy_healthcheck_status_codes }}"
  register: app_proxy_healthcheck
  retries: "{{ app_healthcheck_retries }}"
  delay: "{{ app_healthcheck_delay }}"
  until: app_proxy_healthcheck.status in app_proxy_healthcheck_status_codes
