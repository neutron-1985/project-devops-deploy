---
- name: Save active deployment slot
  ansible.builtin.copy:
    dest: "{{ app_active_slot_file }}"
    content: "{{ app_target_slot }}\n"
    owner: root
    group: root
    mode: "0644"

- name: Stop previous application slot
  community.docker.docker_container:
    name: "{{ app_previous_container_name }}"
    state: absent
  when: app_previous_container_name != app_target_container_name
