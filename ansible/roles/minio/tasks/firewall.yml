---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

- name: Keep SSH reachable before enabling UFW
  community.general.ufw:
    rule: allow
    direction: in
    proto: tcp
    port: "{{ minio_ssh_port }}"
    comment: "{{ minio_firewall_comment }}-ssh"

- name: Revoke MinIO access from removed allowlist entries
  community.general.ufw:
    rule: allow
    direction: in
    proto: tcp
    port: "{{ minio_api_port }}"
    src: "{{ item }}"
    comment: "{{ minio_firewall_comment }}"
    delete: true
  loop: "{{ minio_previous_allowed_cidrs | difference(minio_allowed_cidrs) }}"

- name: Allow MinIO access from configured clients
  community.general.ufw:
    rule: allow
    direction: in
    proto: tcp
    port: "{{ minio_api_port }}"
    src: "{{ item }}"
    comment: "{{ minio_firewall_comment }}"
  loop: "{{ minio_allowed_cidrs }}"

- name: Set default incoming policy to deny
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set default outgoing policy to allow
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Create Ansible local facts directory
  ansible.builtin.file:
    path: "{{ minio_fact_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Save current MinIO firewall state as a local fact
  ansible.builtin.copy:
    content: "{{ minio_allowed_cidrs | unique | sort | to_nice_json }}"
    dest: "{{ minio_fact_file }}"
    owner: root
    group: root
    mode: "0600"
