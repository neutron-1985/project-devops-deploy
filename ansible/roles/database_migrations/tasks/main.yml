---
- name: Run database migrations once
  run_once: true
  block:
    - name: Validate database migration configuration
      ansible.builtin.assert:
        that:
          - database_migration_host | length > 0
          - database_migration_name | length > 0
          - database_migration_user | length > 0
          - database_migration_password | length > 0
        fail_msg: "Database migrations require PostgreSQL connection variables."
      no_log: true

    - name: Create database migration directory
      ansible.builtin.file:
        path: "{{ database_migration_dir }}"
        state: directory
        mode: "0755"

    - name: Copy database migrations
      ansible.builtin.copy:
        src: migrations/
        dest: "{{ database_migration_dir }}/"
        mode: "0644"

    - name: Apply database migrations
      community.docker.docker_container:
        name: "{{ database_migration_container_name }}"
        image: "{{ database_migration_image }}"
        state: started
        command: migrate
        detach: false
        cleanup: true
        recreate: true
        pull: missing
        volumes:
          - "{{ database_migration_dir }}:/flyway/sql:ro"
        env:
          FLYWAY_URL: "{{ database_migration_url }}"
          FLYWAY_USER: "{{ database_migration_user }}"
          FLYWAY_PASSWORD: "{{ database_migration_password }}"
          FLYWAY_BASELINE_ON_MIGRATE: "true"
          FLYWAY_BASELINE_VERSION: "{{ database_migration_baseline_version }}"
          FLYWAY_CONNECT_RETRIES: "{{ database_migration_connect_retries }}"
          FLYWAY_VALIDATE_MIGRATION_NAMING: "true"
          REDGATE_DISABLE_TELEMETRY: "true"
      no_log: true
      when: not ansible_check_mode
