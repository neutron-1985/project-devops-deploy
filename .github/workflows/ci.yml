name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE }}

jobs:
  # Проверяет backend: поднимает Java-окружение, запускает линтер и тесты Gradle.
  backend:
    runs-on: ubuntu-latest
    steps:
      # Загружает код репозитория в runner, чтобы были доступны Makefile, Gradle и src.
      - uses: actions/checkout@v6
      # Устанавливает JDK для запуска Gradle-команд.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Run linter
        run: make lint
      - name: Run tests
        run: make test

  # Проверяет frontend отдельно от backend, чтобы быстрее видеть источник ошибки.
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Все команды этого job выполняются из каталога frontend.
        working-directory: frontend
    steps:
      # Загружает код репозитория в runner.
      - uses: actions/checkout@v6
      # Устанавливает Node.js и включает кеш npm-зависимостей по package-lock.json.
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint
      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
