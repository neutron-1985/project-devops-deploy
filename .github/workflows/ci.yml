name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Проверяет backend: поднимает Java-окружение, запускает линтер и тесты Gradle.
  backend:
    runs-on: ubuntu-latest
    steps:
      # Загружает код репозитория в runner, чтобы были доступны Makefile, Gradle и src.
      - uses: actions/checkout@v6
      # Устанавливает JDK для запуска Gradle-команд.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Run linter
        run: make lint
      - name: Run tests
        run: make test

  # Проверяет frontend отдельно от backend, чтобы быстрее видеть источник ошибки.
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Все команды этого job выполняются из каталога frontend.
        working-directory: frontend
    steps:
      # Загружает код репозитория в runner.
      - uses: actions/checkout@v6
      # Устанавливает Node.js и включает кеш npm-зависимостей по package-lock.json.
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint
      - name: Build
        run: npm run build

  ansible-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v6

      - name: Install Ansible
        run: python -m pip install ansible

      - name: Install Ansible dependencies
        run: make ansible-install

      - name: Configure Ansible Vault
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          test -n "$ANSIBLE_VAULT_PASSWORD"
          install -m 600 /dev/null ansible/.vault-password
          printf '%s\n' "$ANSIBLE_VAULT_PASSWORD" > ansible/.vault-password

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Run Ansible check
        run: make ansible-check APP_IMAGE_TAG=latest

  docker:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - ansible-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Read Docker configuration
        id: docker-config
        run: make --silent docker-config >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.docker-config.outputs.registry }}
          username: ${{ steps.docker-config.outputs.username }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.docker-config.outputs.registry }}/${{ steps.docker-config.outputs.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=long

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Install Ansible
        run: python -m pip install ansible

      - name: Install Ansible dependencies
        run: make ansible-install

      - name: Configure Ansible Vault
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          test -n "$ANSIBLE_VAULT_PASSWORD"
          install -m 600 /dev/null ansible/.vault-password
          printf '%s\n' "$ANSIBLE_VAULT_PASSWORD" > ansible/.vault-password

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy published Docker image
        run: make deploy APP_IMAGE_TAG=sha-${{ github.sha }}
