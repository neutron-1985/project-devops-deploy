- hosts: production
  become: true

  vars:
    users:
      - name: deployer
        groups: docker
    allowed_tcp_ports:
      - "22"
      - "8080"
      - "9090"

  roles:
    - geerlingguy.docker

  tasks:
    - name: add users
      ansible.builtin.user:
        name: "{{ item.name }}"
        groups: "{{ item.groups }}"
        append: true
        state: present
        shell: /bin/bash
      loop: "{{ users }}"

    - name: Install UFW
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true

    - name: Allow required TCP ports
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: "{{ allowed_tcp_ports }}"

    - name: Set default incoming policy to deny
      community.general.ufw:
        direction: incoming
        policy: deny

    - name: Set default outgoing policy to allow
      community.general.ufw:
        direction: outgoing
        policy: allow

    - name: Enable UFW
      community.general.ufw:
        state: enabled

    - name: Deploy application
      ansible.builtin.include_role:
        name: app_deploy
