- name: Provision production servers
  hosts: production
  remote_user: "{{ provision_user }}"
  become: true
  gather_facts: false
  tags:
    - provision

  vars:
    users:
      - name: "{{ deploy_user }}"
        groups: docker
    allowed_tcp_ports:
      - "22"
      - "8080"
      - "9090"
    app_data_dir: /var/lib/project-devops-deploy
    app_uploads_dir: "{{ app_data_dir }}/bulletin-images"
    app_log_dir: /var/log/project-devops-deploy

  pre_tasks:
    - name: Gather facts for provisioning
      ansible.builtin.setup:

  roles:
    - role: geerlingguy.docker

  tasks:
    - name: Add deploy users
      ansible.builtin.user:
        name: "{{ item.name }}"
        groups: "{{ item.groups }}"
        append: true
        state: present
        shell: /bin/bash
      loop: "{{ users }}"

    - name: Install UFW
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true

    - name: Allow required TCP ports
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: "{{ allowed_tcp_ports }}"

    - name: Set default incoming policy to deny
      community.general.ufw:
        direction: incoming
        policy: deny

    - name: Set default outgoing policy to allow
      community.general.ufw:
        direction: outgoing
        policy: allow

    - name: Enable UFW
      community.general.ufw:
        state: enabled

    - name: Create application persistent directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: docker
        mode: "{{ item.mode }}"
      loop:
        - path: "{{ app_data_dir }}"
          mode: "0755"
        - path: "{{ app_uploads_dir }}"
          mode: "0777"
        - path: "{{ app_log_dir }}"
          mode: "0755"

- name: Deploy application
  hosts: production
  remote_user: "{{ deploy_user }}"
  become: false
  gather_facts: false
  tags:
    - deploy

  roles:
    - role: app_deploy
